
<div class="top-actions">
  <mat-slide-toggle [checked]="isDarkMode" (change)="toggleTheme($event.checked)">{{mode}} Mode</mat-slide-toggle>
  <button mat-stroked-button color="primary" matTooltip="logout"   class="logout-btn"  routerLink="/login" (click)="logOut()">
    Logout
    <mat-icon>logout</mat-icon>
  </button>
</div>
<div class="container">
    <div class="title">
    <h2>{{ title }}</h2>
    </div>
    <div class="quote">
      {{quote}}
       <mat-icon  mat-raised-button [ngClass]="{ 'rotate': isRotating }"  (click)='refreshQuotes()' matTooltip ="refresh quotes"  >refresh</mat-icon>
    </div>
  <mat-tab-group class="home-tabs" animationDuration="200ms">
    <mat-tab label="Tracker">
      <div class="tab-panel">
        <div class="items">
          <todo-grid [displayedColumns]="displayedColumns" [tasks]="tasks" (tasksUpdated)="onTasksUpdated($event)"></todo-grid>
          <div class="right-item">
            <div class="save-button-container">
              <button mat-raised-button (click)="openAddorDeletePopup()">Add/Delete Columns</button>
              <button mat-raised-button (click)="openResetDialog()">Reset</button>
              <button mat-raised-button (click)="saveGridData()">Save Changes</button>
            </div>
            <div class="progress-bar">
              <!-- Weekly Progress -->
              <h2>Weekly Progress</h2>
              <mat-progress-bar [value]="weekCompletion" mode="determinate"></mat-progress-bar>
              <p>{{ weekCompletion }}% completed this week</p>

              <!-- Monthly Progress -->
              <h2>Monthly Progress</h2>
              <mat-progress-bar [value]="monthCompletion" mode="determinate"></mat-progress-bar>
              <p>{{ monthCompletion }}% completed this month</p>

              <!-- Overall Progress -->
              <h2>Overall Progress</h2>
              <mat-progress-bar [value]="overallCompletion" mode="determinate"></mat-progress-bar>
              <p>{{ overallCompletion }}% completed (100 days)</p>
            </div>
          </div>
        </div>
      </div>
    </mat-tab>

    <mat-tab label="Stats">
      <div class="tab-panel">
        <app-stats [tasks]="tasks" [columns]="displayedColumns"></app-stats>
      </div>
    </mat-tab>

    <mat-tab label="Focus">
      <div class="tab-panel">
        <app-focus [tasks]="tasks" [columns]="displayedColumns"></app-focus>
      </div>
    </mat-tab>

    <mat-tab label="Calendar">
      <div class="tab-panel">
        <app-calendar [tasks]="tasks"></app-calendar>
      </div>
    </mat-tab>

    <mat-tab label="Streaks">
      <div class="tab-panel">
        <app-streaks [tasks]="tasks" [columns]="displayedColumns"></app-streaks>
      </div>
    </mat-tab>

    <mat-tab label="Habits">
      <div class="tab-panel">
        <app-habits [tasks]="tasks" [columns]="displayedColumns"></app-habits>
      </div>
    </mat-tab>

    <mat-tab label="Goals">
      <div class="tab-panel">
        <app-goals [tasks]="tasks"></app-goals>
      </div>
    </mat-tab>

    <mat-tab label="Insights">
      <div class="tab-panel">
        <app-insights [tasks]="tasks" [columns]="displayedColumns"></app-insights>
      </div>
    </mat-tab>

    <mat-tab label="Export">
      <div class="tab-panel">
        <app-export [tasks]="tasks"></app-export>
      </div>
    </mat-tab>
  </mat-tab-group>
    </div>
