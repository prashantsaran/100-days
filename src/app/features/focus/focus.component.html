<mat-card class="feature-card">
  <mat-card-header>
    <mat-icon mat-card-avatar>my_location</mat-icon>
    <mat-card-title>Today Focus</mat-card-title>
    <mat-card-subtitle>{{ nextTask ? nextTask.day : 'All tracked days are complete' }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <ng-container *ngIf="nextTask; else completeState">
      <p>Pending habits for the next incomplete day:</p>
      <mat-chip-set>
        <mat-chip *ngFor="let habit of pendingHabits">{{ habit | titlecase }}</mat-chip>
      </mat-chip-set>
    </ng-container>
    <ng-template #completeState>
      <p>Your 100 day challenge is fully complete.</p>
    </ng-template>
  </mat-card-content>
</mat-card>
