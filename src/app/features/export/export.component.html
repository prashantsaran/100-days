<mat-card class="feature-card">
  <mat-card-header>
    <mat-icon mat-card-avatar>file_download</mat-icon>
    <mat-card-title>Export</mat-card-title>
    <mat-card-subtitle>Copy or download your local challenge data.</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="actions">
      <button mat-raised-button color="primary" (click)="copyJson()">
        <mat-icon>content_copy</mat-icon>
        Copy JSON
      </button>
      <button mat-stroked-button color="primary" (click)="downloadJson()">
        <mat-icon>download</mat-icon>
        Download
      </button>
    </div>
    <pre>{{ tasks | json }}</pre>
  </mat-card-content>
</mat-card>
